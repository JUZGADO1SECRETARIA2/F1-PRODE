<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Prode</title>
    <!-- Google Fonts: Roboto & Racing Sans One for F1 feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Header -->
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-flag-checkered"></i>
            <span>PRODE <span class="text-red">F1</span></span>
        </div>
        <div class="user-profile" id="userProfileBtn">
            <select id="user-switcher" title="Cambiar Jugador Activo">
                <option value="p1">Tomás</option>
                <option value="p2">Jugador 2</option>
                <option value="p3">Jugador 3</option>
                <option value="p4">Jugador 4</option>
                <option value="p5">Jugador 5</option>
            </select>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
        
        <!-- View: Leaderboard -->
        <section id="view-leaderboard" class="view active">
            <div class="view-header">
                <h2>Tabla de Posiciones</h2>
                <p>Temporada 2026</p>
            </div>
            <div class="leaderboard-container">
                <!-- Populated dynamically by JS -->
            </div>
            <div style="margin-top: 30px; text-align: center;">
                <button type="button" class="btn-primary" style="background:#333; font-size:14px; padding:10px" id="resetDataBtn">Resetear Datos Locales</button>
            </div>
        </section>

        <!-- View: Predictions -->
        <section id="view-predictions" class="view">
            <div class="view-header">
                <h2>Mis Predicciones</h2>
                <p>Próxima Carrera: Gran Premio de Bahréin</p>
            </div>
            
            <form id="prediction-form" class="prediction-form">
                <div class="prediction-group">
                    <label><i class="fa-solid fa-stopwatch"></i> Pole Position (5 pts)</label>
                    <select class="driver-select" name="pole" required>
                        <option value="">Seleccionar Piloto...</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>

                <div class="prediction-group podium">
                    <label>Carrera: 1° Puesto (25 pts)</label>
                    <select class="driver-select" name="pos1" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>
                <div class="prediction-group podium">
                    <label>Carrera: 2° Puesto (18 pts)</label>
                    <select class="driver-select" name="pos2" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>
                <div class="prediction-group podium">
                    <label>Carrera: 3° Puesto (15 pts)</label>
                    <select class="driver-select" name="pos3" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>
                
                <div class="prediction-group mid-pack">
                    <label>Carrera: 11° Puesto (25 pts)</label>
                    <select class="driver-select" name="pos11" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>
                <div class="prediction-group mid-pack">
                    <label>Carrera: 12° Puesto (18 pts)</label>
                    <select class="driver-select" name="pos12" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>
                <div class="prediction-group mid-pack">
                    <label>Carrera: 13° Puesto (15 pts)</label>
                    <select class="driver-select" name="pos13" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>

                <div class="prediction-group dnf">
                    <label><i class="fa-solid fa-skull-crossbones"></i> Último (10 pts)</label>
                    <select class="driver-select" name="last" required>
                         <option value="">Seleccionar Piloto...</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Guardar Predicciones</button>
            </form>
        </section>

        <!-- View: Admin / Results -->
        <section id="view-admin" class="view">
            <div class="view-header">
                <h2>Cargar Resultados</h2>
                <p>Solo cargar cuando termine la carrera</p>
            </div>
            
            <form id="results-form" class="prediction-form">
                <p class="admin-warning"><i class="fa-solid fa-triangle-exclamation"></i> Al guardar los resultados, se calcularán los puntos para todos los jugadores automáticamente.</p>
                
                <button type="button" class="btn-primary admin-btn" id="generateResultsMock">Simular Resultados de Carrera y Calcular</button>
            </form>
        </section>

    </main>

    <!-- Bottom Navigation for Mobile -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="view-leaderboard">
            <i class="fa-solid fa-trophy"></i>
            <span>Ranking</span>
        </a>
        <a href="#" class="nav-item" data-target="view-predictions">
            <i class="fa-solid fa-flag-checkered"></i>
            <span>Votar</span>
        </a>
        <a href="#" class="nav-item" data-target="view-admin">
            <i class="fa-solid fa-list-check"></i>
            <span>Resultados</span>
        </a>
    </nav>

    <script type="module" src="firebase-config.js"></script>
    <script src="logic.js"></script>
    <script src="app.js"></script>
</body>
</html>
